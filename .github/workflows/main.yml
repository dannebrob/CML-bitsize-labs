name: Sync lab Markdown files to blog

on:
  push:
    branches: [ "main" ]
    paths:
      - "labs/**"
      - "images/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (Lab repo)
        uses: actions/checkout@v4

      - name: Checkout blog repo (Repo B)
        uses: actions/checkout@v4
        with:
          repository: dannebrob/dannebrob.github.io
          token: ${{ secrets.PAT }}
          path: blog

      - name: Copy images from root images/ to blog/images/
        run: |
          mkdir -p blog/images
          if [ -d images ]; then
            cp images/* blog/images/ || true
          fi

      - name: Copy and rewrite MD files from labs/ to blog/_posts/
        run: |
          mkdir -p blog/_posts

          find labs -type f -name "*.md" | while read file; do
            filename=$(basename "$file")
            dirname=$(basename "$(dirname "$file")")
            cleanname="${filename%.md}"

            # NY TITEL: endast filnamnet, ingen mapp
            title="$(echo "$cleanname" | tr '-' ' ' | sed 's/.*/\u&/') (CML-bitsize-labs)"

            # Kategori baserat på undermappen (oförändrat)
            category="$(echo "$dirname" | tr '[:upper:]' '[:lower:]')"

            # Leta efter befintlig post baserat på source_path
            existing=$(grep -Rl "source_path: \"$file\"" blog/_posts/ || true)

            if [ -n "$existing" ]; then
              echo "Updating existing post: $existing"
              newname=$(basename "$existing")
            else
              # Datum-baserat filnamn (oförändrat)
              newname="$(date +%Y-%m-%d)-${{ github.event.repository.name }}-$filename"
              echo "Creating new post: $newname"
            fi

            {
              echo "---"
              echo "title: \"$title\""
              echo "categories: [\"$category\"]"
              echo "source_repo: \"${{ github.event.repository.name }}\""
              echo "source_path: \"$file\""
              echo "---"
              echo
              sed 's#](/images/#](/images/#g' "$file"
            } > "blog/_posts/$newname"
          done

      - name: Commit and push changes to blog
        run: |
          cd blog
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync lab MD files and root images" || echo "No changes to commit"
          git push
