name: Sync lab Markdown files to blog

on:
  push:
    branches: [ "main" ]
    paths:
      - "labs/**"
      - "images/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (Lab repo)
        uses: actions/checkout@v4

      - name: Checkout blog repo (Repo B)
        uses: actions/checkout@v4
        with:
          repository: dannebrob/dannebrob.github.io
          token: ${{ secrets.PAT }}
          path: blog

      # Kopiera bilder från root/images → blog/images
      - name: Copy images from root images/ to blog/images/
        run: |
          mkdir -p blog/images
          if [ -d images ]; then
            cp images/* blog/images/ || true
          fi

      # Kopiera och skriv om MD-filer från labs/ → blog/_posts/
      - name: Copy and rewrite MD files from labs/ to blog/_posts/
        run: |
          mkdir -p blog/_posts

          # Snyggt repo-namn (t.ex. "CML Bitsize Labs")
          pretty_repo="$(echo "${{ github.event.repository.name }}" | tr '-' ' ' | sed 's/.*/\u&/')"

          find labs -type f -name "*.md" | while read file; do
            filename=$(basename "$file")
            dirname=$(basename "$(dirname "$file")")
            cleanname="${filename%.md}"

            # Snygg titel baserat på filnamnet
            pretty_cleanname="$(echo "$cleanname" | tr '-' ' ' | sed 's/.*/\u&/')"
            title="$pretty_cleanname ($pretty_repo)"

            # Kategori baserat på undermappen
            category="$(echo "$dirname" | tr '[:upper:]' '[:lower:]')"

            # Leta efter befintlig post baserat på source_path
            existing=$(grep -Rl "source_path: \"$file\"" blog
