# --- Import this for the lab topology and startup configs. ---

# Check the node definitions to ensure they match the devices you intend to use in the lab.

lab:
  description: "OSPF Summarization Lab"
  notes: "This is a lab made by Daniel Brobäck to demonstrate OSPF summarization. The lab consists of 4 routers (R1, R2, R3, and R4) connected in a linear topology. R1 has multiple loopback interfaces that will be summarized when advertised to R2. R2 will then advertise the summary route to R3, which will further advertise it to R4. If you have any questions or suggestions for improvement, please feel free to reach out to me on GitHub https://github.com/dannebrob."
  title: "01-OSPF-Summarization"
  version: 0.2.0

nodes:
- id: n1
  label: R1
  node_definition: iol-xe
  x: -300
  y: 0
  configuration: |
    hostname R1
    !
    interface Ethernet0/0
     ip address 10.10.0.2 255.255.255.252
     no shutdown
    !
    interface Loopback1
     ip address 10.10.1.1 255.255.255.252
    interface Loopback2
     ip address 10.10.2.1 255.255.255.252
    interface Loopback3
     ip address 10.10.3.1 255.255.255.252
    interface Loopback4
     ip address 10.11.1.1 255.255.255.252
    interface Loopback5
     ip address 10.11.2.1 255.255.255.252
    interface Loopback6
     ip address 10.11.3.1 255.255.255.252
    !
    router ospf 1
     router-id 1.1.1.1
     network 10.10.0.0 0.0.0.3 area 10
     network 10.10.1.0 0.0.0.3 area 10
     network 10.10.2.0 0.0.0.3 area 10
     network 10.10.3.0 0.0.0.3 area 10
    !
    end

- id: n2
  label: R2
  node_definition: iol-xe
  x: 0
  y: 0
  configuration: |
    hostname R2
    !
    interface Ethernet0/0
     ip address 10.10.0.1 255.255.255.252
     no shutdown
    interface Ethernet0/1
     ip address 10.0.0.1 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 2.2.2.2
     network 10.10.0.0 0.0.0.3 area 10
     network 10.0.0.0 0.0.0.3 area 0
    !
    end

- id: n3
  label: R3
  node_definition: iol-xe
  x: 300
  y: 0
  configuration: |
    hostname R3
    !
    interface Ethernet0/0
     ip address 10.0.0.2 255.255.255.252
     no shutdown
    interface Ethernet0/1
     ip address 10.20.0.2 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 3.3.3.3
     network 10.0.0.0 0.0.0.3 area 0
     network 10.20.0.0 0.0.0.3 area 20
    !
    end

- id: n4
  label: R4
  node_definition: iol-xe
  x: 600
  y: 0
  configuration: |
    hostname R4
    !
    interface Ethernet0/0
     ip address 10.20.0.1 255.255.255.252
     no shutdown
    !
    router ospf 1
     router-id 4.4.4.4
     network 10.20.0.0 0.0.0.3 area 20
    !
    end

links:
- id: l1
  n1: n1
  i1: Ethernet0/0
  n2: n2
  i2: Ethernet0/0

- id: l2
  n1: n2
  i1: Ethernet0/1
  n2: n3
  i2: Ethernet0/0

- id: l3
  n1: n3
  i1: Ethernet0/1
  n2: n4
  i2: Ethernet0/0
