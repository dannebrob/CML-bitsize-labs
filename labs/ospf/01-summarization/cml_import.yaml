nodes:
- boot_disk_size: null
  configuration:
  - name: ios_config.txt
    content: |
      hostname R1
      !
      ! In order to avoid entering a configuration dialog
      ! on boot, please ensure that all ethernet interfaces
      ! have some ip configuration present here such as the
      ! example below:
      !
      interface Ethernet 0/0
       ip address 10.10.0.2 255.255.255.252
       description Transit to R2
       no shutdown
      !
      interface lo1
       ip address 10.10.1.1 255.255.255.252
      interface lo2
       ip address 10.10.2.1 255.255.255.252
      interface lo3
       ip address 10.10.3.1 255.255.255.252
      interface lo4
       ip address 10.10.4.1 255.255.255.252
      interface lo5
       ip address 10.10.5.1 255.255.255.252
      interface lo6
       ip address 10.10.6.1 255.255.255.252
      !
      !
      ip route 10.11.1.0 255.255.255.252 Loopback4
      ip route 10.11.2.0 255.255.255.252 Loopback5
      ip route 10.11.3.0 255.255.255.252 Loopback6
      !
      !
      router ospf 1
       router-id 1.1.1.1
       network 10.10.0.0 0.0.0.3 area 10
       network 10.10.1.0 0.0.0.3 area 10
       network 10.10.2.0 0.0.0.3 area 10
       network 10.10.3.0 0.0.0.3 area 10
      !
      !
      end
